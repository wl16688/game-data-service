server:
  port: 8080

spring:
  application:
    name: game-data-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 100
          max-wait: -1ms
          max-idle: 10
          min-idle: 2
